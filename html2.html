<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apex Club</title>

<style>
* {margin:0; padding:0; box-sizing:border-box;}

body {
    font-family: 'Arial', sans-serif;
    background: #050505;
    color: white;
    overflow-x: hidden;
}

/* 🌌 ГЛУБОКИЙ ФОН */
.bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 20% 30%, #111, #000 70%);
    z-index: -2;
}

.glow {
    position: fixed;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(201,169,110,0.25), transparent);
    filter: blur(120px);
    animation: float 10s infinite alternate;
}

.glow2 {
    top: 60%;
    left: 60%;
    animation-delay: 3s;
}

@keyframes float {
    from { transform: translate(0,0); }
    to { transform: translate(-80px,-80px); }
}

/* HERO */
.hero {
    height: 100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

h1 {
    font-size: 60px;
    background: linear-gradient(90deg,#fff,#c9a96e);
    -webkit-background-clip: text;
    color: transparent;
}

.subtitle {
    margin-top:10px;
    color:#c9a96e;
}

.desc {
    margin-top:20px;
    max-width:600px;
    color:#aaa;
}

/* 🔥 кнопка */
.btn {
    margin-top:40px;
    padding:15px 35px;
    border-radius:50px;
    background: linear-gradient(135deg,#c9a96e,#f2d28b);
    color:black;
    text-decoration:none;
    font-weight:bold;
    position:relative;
    transition:0.3s;
}

.btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 30px rgba(201,169,110,0.6);
}

/* 💎 карточки */
.section {
    padding:80px 20px;
    text-align:center;
}

.grid {
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
    gap:25px;
    max-width:1000px;
    margin:auto;
}

.card {
    padding:25px;
    border-radius:20px;
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(20px);
    border:1px solid rgba(255,255,255,0.05);
    transition:0.4s;
}

.card:hover {
    transform: translateY(-10px) scale(1.02);
    background: rgba(255,255,255,0.08);
}

/* 💰 давление */
.limited {
    margin-top:15px;
    color:#c9a96e;
    animation:pulse 2s infinite;
}

@keyframes pulse {
    0%{opacity:0.5;}
    50%{opacity:1;}
    100%{opacity:0.5;}
}

/* 📱 адаптация */
@media(max-width:768px){
    h1{font-size:36px;}
    .desc{font-size:14px;}
}

/* появление */
.fade {
    opacity:0;
    transform: translateY(30px);
    transition:1s;
}
.fade.show {
    opacity:1;
    transform: translateY(0);
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="glow"></div>
<div class="glow glow2"></div>

<!-- HERO -->
<div class="hero">
    <h1>Apex Club</h1>
    <div class="subtitle">доступ к невозможному</div>

    <div class="desc">
        Закрытый консьерж-сервис для тех,
        кто ценит время и уровень жизни.
    </div>

    <a class="btn" href="https://t.me/apexclub1_bot">
        Получить доступ
    </a>

    <div class="limited">
        Осталось 5 мест • доступ ограничен
    </div>
</div>

<!-- SERVICES -->
<div class="section fade">
    <h2>Услуги</h2>

    <div class="grid">
        <div class="card">✈️ Private jet</div>
        <div class="card">🍽 Рестораны</div>
        <div class="card">🎟 VIP события</div>
        <div class="card">🛍 Шопинг</div>
    </div>
</div>

<!-- WHY -->
<div class="section fade">
    <h2>Почему мы</h2>

    <div class="grid">
        <div class="card">⚡ Быстро</div>
        <div class="card">🔒 Безопасно</div>
        <div class="card">💎 Эксклюзивно</div>
    </div>
</div>

<script>
const fades = document.querySelectorAll('.fade');

window.addEventListener('scroll', () => {
    fades.forEach(el => {
        const top = el.getBoundingClientRect().top;
        if(top < window.innerHeight - 100){
            el.classList.add('show');
        }
    });
});
</script>

</body>
</html>
